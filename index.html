<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>eLRC v2.19</title>
<script src="https://www.youtube.com/iframe_api"></script>
<style>
:root {
    --bg: #000;
    --surface: #111;
    --border: #2a2a2a;
    --accent: #fff;
    --muted: #555;
    --green: #00ff88;
    --split: #ffaa00;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --mono: 'Courier New', monospace;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
body {
    background: var(--bg); color: #eee; font-family: var(--font);
    height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column;
}

/* TOPBAR */
.topbar {
    height: 56px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; flex-shrink: 0;
    background: rgba(15, 15, 15, 0.4);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    position: fixed; top: 0; left: 0; right: 0; z-index: 2000;
}
.time-disp { font-family: var(--mono); font-size: 1rem; font-weight: 700; color: #fff; letter-spacing: 1px; }

/* BUTTONS */
.btn {
    background: var(--surface); border: 1px solid var(--border); color: #fff;
    padding: 10px 16px; border-radius: 50px; font-size: 0.8rem; font-weight: 700;
    cursor: pointer; font-family: var(--font); white-space: nowrap;
}
.btn:active { background: #222; }
.btn.accent { background: #fff; color: #000; border-color: #fff; }
.btn.accent:active { background: #ddd; }

/* DRAWER */
.drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; display: none; }
.drawer-overlay.open { display: block; }
.drawer {
    position: fixed; top: 0; left: 0; bottom: 0; width: min(92vw, 380px);
    background: #0a0a0a; border-right: 1px solid var(--border); z-index: 300;
    transform: translateX(-100%); transition: transform 0.3s ease;
    display: flex; flex-direction: column; overflow: hidden;
}
.drawer.open { transform: translateX(0); }
.drawer-head {
    padding: 18px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.drawer-head h2 { font-size: 1rem; font-weight: 900; }
.close-btn {
    width: 32px; height: 32px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 50%; color: #fff; font-size: 1.2rem;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
}
.drawer-body {
    flex: 1; overflow-y: auto; padding: 16px 20px;
    display: flex; flex-direction: column; gap: 18px;
    padding-bottom: calc(20px + env(safe-area-inset-bottom));
}
.field-label {
    font-size: 0.65rem; font-weight: 800; text-transform: uppercase;
    letter-spacing: 1px; color: var(--muted); margin-bottom: 6px;
}
.url-row { display: flex; gap: 8px; }
.url-row input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    color: #fff; padding: 11px 14px; border-radius: 12px; font-size: 0.85rem; font-family: var(--font);
}
#status-pill {
    font-size: 0.75rem; padding: 6px 12px; border-radius: 50px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--muted); text-align: center; margin-top: 8px;
}

/* YT PLAYER */
.yt-wrap { margin: 0 -20px; }
.yt-box {
    background: #000; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
    overflow: hidden; width: 100%; aspect-ratio: 16 / 9; position: relative;
}
.yt-box iframe, #yt-player {
    position: absolute; top: 0; left: 0;
    width: 100% !important; height: 100% !important;
}

textarea {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    color: #fff; padding: 12px 14px; border-radius: 12px;
    font-size: 0.82rem; font-family: var(--mono); resize: none; height: 130px; line-height: 1.5;
}
textarea::placeholder { color: var(--muted); }
.mode-toggle { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: 50px; padding: 3px; gap: 3px; }
.mode-btn {
    flex: 1; padding: 9px; border-radius: 50px; border: none;
    background: transparent; color: var(--muted); font-size: 0.8rem; font-weight: 700;
    cursor: pointer; font-family: var(--font); transition: 0.15s;
}
.mode-btn.active { background: #333; color: #fff; }
.lrc-out-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
#lrc-out {
    height: 90px; border: none; background: transparent; color: var(--green);
    font-size: 0.72rem; padding: 10px 12px; width: 100%; resize: none; font-family: var(--mono);
}
.export-btns { display: flex; gap: 8px; padding: 10px; border-top: 1px solid var(--border); }
.export-btns .btn { flex: 1; text-align: center; }

/* LYRICS */
.lyrics-area {
    flex: 1; overflow-y: auto; padding: 106px 0 380px;
    -webkit-overflow-scrolling: touch; z-index: 1; position: relative;
}
.lyric-line {
    padding: 10px 24px; font-size: 1.4rem; font-weight: 700;
    color: rgba(255,255,255,0.2); line-height: 1.6;
    transform: scale(0.96); transform-origin: left center;
    border-radius: 14px; margin: 2px 8px;
    transition: color 0.35s cubic-bezier(0.4,0,0.2,1),
                transform 0.35s cubic-bezier(0.4,0,0.2,1),
                opacity 0.35s cubic-bezier(0.4,0,0.2,1);
    opacity: 0.5;
}
.lyric-line.active { color: rgba(255,255,255,0.92); transform: scale(1); opacity: 1; }
.lyric-line.music-line {
    font-size: 0.9rem; color: rgba(255,255,255,0.1);
    font-style: italic; letter-spacing: 3px;
    display: flex; align-items: center; justify-content: space-between;
    padding-right: 12px;
}
.lyric-line.music-line.active { color: rgba(255,255,255,0.35); }
.music-delete {
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(255,50,50,0.12); border: 1px solid rgba(255,50,50,0.25);
    color: #ff4444; font-size: 0.85rem; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; touch-action: manipulation;
}
.music-delete:active { background: rgba(255,50,50,0.4); }

/* WORD SPANS */
.word-span {
    display: inline; border-radius: 5px; padding: 1px 2px;
    color: rgba(255,255,255,0.2);
    cursor: pointer; position: relative;
    -webkit-user-select: none; user-select: none;
    transition: color 0.12s, text-shadow 0.12s;
}
/* Timed words: full brightness — the "trail" stays lit */
.word-span.past {
    color: rgba(255,255,255,1);
}
/* Active word: bright + glowing underline to mark the playhead */
.word-span.now {
    color: #fff;
    border-bottom: 2px solid rgba(255,255,255,0.85);
    padding-bottom: 0px;
    text-shadow: 0 0 12px rgba(255,255,255,0.55);
}

/* SPLIT WORD STYLING */
.word-span.split-marked {
    border-bottom: 2px dashed var(--split);
    color: var(--split);
    padding-bottom: 0px;
}
.word-span.split-marked.past {
    color: var(--split);
    opacity: 0.85;
}
.word-span.split-marked.now {
    color: var(--split);
    border-bottom: 2px solid var(--split);
    text-shadow: 0 0 12px rgba(255,170,0,0.6);
}
/* Split progress dots shown in ctx bar */
.split-dots { display: inline-flex; gap: 3px; align-items: center; margin-left: 4px; }
.split-dot { width: 6px; height: 6px; border-radius: 50%; background: #444; flex-shrink: 0; }
.split-dot.filled { background: var(--split); }

/* CONTEXT BAR */
.ctx-bar {
    position: fixed; top: 62px; left: 50%; transform: translateX(-50%);
    background: #111; border: 1px solid #2a2a2a; border-radius: 50px;
    padding: 5px 16px; font-size: 0.78rem; font-weight: 700;
    display: flex; align-items: center; gap: 8px; z-index: 40;
    opacity: 0; pointer-events: none; transition: opacity 0.2s; white-space: nowrap;
}
.ctx-bar.show { opacity: 1; }
.ctx-past { color: #3a3a3a; }
.ctx-now  { color: #fff; font-size: 0.9rem; }
.ctx-now.split-active { color: var(--split); }
.ctx-sep  { color: #2a2a2a; }
.ctx-split-info { color: var(--split); font-size: 0.7rem; margin-left: 2px; }

/* DOCK */
.dock {
    position: fixed; bottom: calc(14px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
    width: calc(100% - 20px); max-width: 520px;
    background: rgba(15, 15, 15, 0.4); border: 1px solid #2a2a2a; border-radius: 32px;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    padding: 12px; display: flex; flex-direction: column; gap: 10px;
    z-index: 50; box-shadow: 0 8px 40px rgba(0,0,0,0.95);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
.seek-row { display: flex; align-items: center; gap: 10px; font-family: var(--mono); font-size: 0.7rem; color: var(--muted); }
input[type=range] { flex: 1; -webkit-appearance: none; background: #2a2a2a; height: 3px; border-radius: 2px; border: none; padding: 0; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #fff; border-radius: 50%; }
.ctrl-row { display: flex; align-items: center; gap: 5px; }

/* PLAY BUTTON */
.play-btn {
    width: 52px; height: 52px; border-radius: 50%;
    background: #fff; color: #000; font-size: 1.2rem;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; border: none; cursor: pointer;
    touch-action: manipulation; user-select: none; -webkit-user-select: none;
    transition: transform 0.08s, background 0.08s;
}
.play-btn.playing { box-shadow: 0 0 0 3px rgba(255,255,255,0.15); }
.play-btn.pressed { background: #bbb; transform: scale(0.92); }

/* SEEK BUTTONS */
.seek-btn {
    width: 40px; height: 52px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 13px; color: #fff; font-size: 0.72rem; font-weight: 700;
    cursor: pointer; font-family: var(--font); flex-shrink: 0; touch-action: manipulation;
}
.seek-btn:active { background: #222; }

/* TAP BUTTON */
.tap-btn {
    flex: 2; height: 52px; background: #1c1c1c; border: 1.5px solid #333;
    border-radius: 26px; color: #fff; font-size: 0.95rem; font-weight: 800;
    letter-spacing: 0.5px; cursor: pointer; font-family: var(--font);
    touch-action: manipulation; user-select: none; -webkit-user-select: none;
    transition: background 0.1s, border-color 0.1s, color 0.1s;
}
.tap-btn:active { background: #fff; color: #000; border-color: #fff; }
.tap-btn.split-mode { background: #1a1200; border-color: #3a2800; color: var(--split); }
.tap-btn.split-mode:active { background: var(--split); color: #000; border-color: var(--split); }

/* CUT BUTTON — always a cut/stamp button */
.music-btn {
    flex: 1; height: 52px; background: #1a1000; border: 1.5px solid #3a2200;
    border-radius: 26px; color: var(--split); font-size: 0.68rem; font-weight: 800;
    cursor: pointer; font-family: var(--font);
    touch-action: manipulation; user-select: none; -webkit-user-select: none;
    transition: background 0.1s, border-color 0.1s, color 0.1s;
}
.music-btn:active { background: var(--split); color: #000; }
.music-btn.split-stamp { background: #1a1000; border-color: #3a2200; color: var(--split); }
.music-btn.split-stamp:active { background: var(--split); color: #000; }

/* SPEED BUTTON */
.speed-btn {
    height: 52px; padding: 0 10px;
    background: #0d0d1a; border: 1.5px solid #1a1a3a;
    border-radius: 26px; color: #7777ff; font-size: 0.75rem; font-weight: 800;
    cursor: pointer; font-family: var(--mono);
    touch-action: manipulation; user-select: none; -webkit-user-select: none;
    white-space: nowrap; flex-shrink: 0;
}
.speed-btn:active { background: #7777ff; color: #000; }

/* ── REVIEW POPUP ── */
.popup-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 500;
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
.popup-overlay.open { opacity: 1; pointer-events: all; }
.popup-sheet {
    width: 100%; max-width: 560px;
    background: #0e0e0e; border: 1px solid #2a2a2a;
    border-radius: 28px 28px 0 0;
    max-height: 80dvh; display: flex; flex-direction: column;
    transform: translateY(40px); transition: transform 0.25s;
    padding-bottom: env(safe-area-inset-bottom);
}
.popup-overlay.open .popup-sheet { transform: translateY(0); }
.popup-head {
    padding: 18px 20px 14px; border-bottom: 1px solid #1e1e1e;
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.popup-head h3 { font-size: 0.95rem; font-weight: 900; }
.popup-body { flex: 1; min-height: 0; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 20px; }
.split-review-item {
    background: #141414; border: 1px solid #2a2a2a; border-radius: 16px;
    padding: 14px 16px; display: flex; flex-direction: column; gap: 12px;
}
.sri-top { display: flex; align-items: center; justify-content: space-between; }
.sri-word { font-size: 1.1rem; font-weight: 800; color: var(--split); }
.sri-line-ref { font-size: 0.7rem; color: #444; font-family: var(--mono); }
.sri-parts { display: flex; flex-direction: column; gap: 8px; }
.sri-part {
    display: flex; align-items: center; gap: 10px;
    background: #0a0a0a; border: 1px solid #222; border-radius: 10px;
    padding: 8px 12px;
}
.sri-part-label { font-size: 0.65rem; color: #555; font-weight: 800; text-transform: uppercase; width: 40px; flex-shrink: 0; }
.sri-part-text {
    flex: 1; background: transparent; border: none; color: #fff;
    font-size: 0.9rem; font-weight: 700; font-family: var(--font);
    min-width: 0;
}
.sri-part-text:focus { outline: 1px solid var(--split); border-radius: 4px; }
.sri-part-time { font-size: 0.7rem; font-family: var(--mono); color: #555; flex-shrink: 0; }
.sri-nudge-row { display: flex; gap: 5px; align-items: center; }
.nudge-btn {
    width: 32px; height: 28px; background: #1a1a1a; border: 1px solid #333;
    border-radius: 8px; color: #aaa; font-size: 0.7rem; font-weight: 800;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.nudge-btn:active { background: #333; }
.sri-seek-btn {
    padding: 5px 12px; background: #0d0d1a; border: 1px solid #1a1a3a;
    border-radius: 20px; color: #7777ff; font-size: 0.72rem; font-weight: 800;
    cursor: pointer;
}
.sri-seek-btn:active { background: #7777ff; color: #000; }
.sri-add-part-btn {
    padding: 6px 14px; background: transparent; border: 1px dashed #2a2a2a;
    border-radius: 20px; color: #444; font-size: 0.75rem; font-weight: 700;
    cursor: pointer; align-self: flex-start;
}
.sri-add-part-btn:active { border-color: var(--split); color: var(--split); }
.sri-remove-btn {
    padding: 5px 12px; background: transparent; border: 1px solid #2a2a2a;
    border-radius: 20px; color: #555; font-size: 0.72rem; font-weight: 700;
    cursor: pointer;
}
.sri-remove-btn:active { border-color: #ff4444; color: #ff4444; }
.popup-done-btn {
    margin: 12px 20px 16px; padding: 14px;
    background: #fff; color: #000; border: none; border-radius: 20px;
    font-size: 0.9rem; font-weight: 900; cursor: pointer; flex-shrink: 0;
}
.popup-done-btn:active { background: #ddd; }

/* ── PREVIEW OVERLAY ── */
.preview-overlay {
    position: fixed; inset: 0; background: #000; z-index: 600;
    display: flex; flex-direction: column;
    opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
.preview-overlay.open { opacity: 1; pointer-events: all; }
.preview-topbar {
    height: 56px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; border-bottom: 1px solid #1a1a1a; flex-shrink: 0;
}
.preview-title { font-size: 0.8rem; font-weight: 800; color: #555; letter-spacing: 1px; text-transform: uppercase; }
.preview-lyrics {
    flex: 1; overflow-y: auto; padding: 40px 24px 120px;
    -webkit-overflow-scrolling: touch;
}
.preview-line {
    font-size: 1.4rem; font-weight: 700; line-height: 1.8;
    margin-bottom: 6px; padding: 8px 12px; border-radius: 14px;
    display: flex; align-items: baseline; flex-wrap: wrap; gap: 0 2px;
    position: relative;
    color: rgba(255,255,255,0.18);
    transition: color 0.2s;
}
.preview-line.p-active { background: rgba(255,255,255,0.04); }
.pk-word {
    display: inline-block;
    padding: 0 2px;
    cursor: pointer;
    position: relative;
    color: transparent; /* base text invisible — overlay handles everything */
}
/* Dim underlay — always visible, shows word in gray */
.pk-word::before {
    content: attr(data-word);
    position: absolute; top: 0; left: 0;
    color: rgba(255,255,255,0.28);
    white-space: nowrap;
    pointer-events: none;
}
/* White overlay — clips from left, expands right */
.pk-word .pk-fill {
    position: absolute; top: 0; left: 0;
    overflow: hidden;
    width: 0%;
    white-space: nowrap;
    color: #fff;
    pointer-events: none;
}
/* No .pk-sweep element needed anymore */
.preview-line .redo-btn {
    margin-left: auto; flex-shrink: 0;
    padding: 4px 12px; background: transparent; border: 1px solid #2a2a2a;
    border-radius: 20px; color: #444; font-size: 0.7rem; font-weight: 800;
    cursor: pointer; opacity: 0; transition: opacity 0.2s;
    font-family: var(--font);
}
.preview-line.p-active .redo-btn,
.preview-line:hover .redo-btn { opacity: 1; color: #fff; border-color: #555; }
.preview-line .redo-btn:active { background: #fff; color: #000; border-color: #fff; }
.preview-line.music-preview {
    font-size: 0.9rem; color: rgba(255,255,255,0.1);
    font-style: italic; letter-spacing: 3px;
}
.preview-line.music-preview.p-active { color: rgba(255,255,255,0.3); }

/* BEAT VISUALIZER */
.beat-bar {
    position: fixed;
    bottom: calc(130px + env(safe-area-inset-bottom));
    left: 50%; transform: translateX(-50%);
    width: calc(100% - 20px); max-width: 520px;
    z-index: 49;
    display: none;
    flex-direction: column;
    gap: 6px;
}
.beat-bar.visible { display: flex; }
.beat-canvas-wrap {
    background: #0a0a0a; border: 1px solid #1e1e1e;
    border-radius: 16px; overflow: hidden;
    height: 54px; position: relative;
}
#beat-canvas { width: 100%; height: 100%; display: block; }
.beat-meta {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 4px;
}
.beat-bpm { font-size: 0.65rem; font-weight: 800; color: #555; font-family: var(--mono); }
.beat-snap-toggle {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.65rem; font-weight: 800; color: #555; cursor: pointer;
}
.beat-snap-toggle input { display: none; }
.snap-pill {
    width: 30px; height: 16px; border-radius: 8px;
    background: #222; border: 1px solid #333; position: relative;
    transition: background 0.2s;
}
.snap-pill::after {
    content: ''; position: absolute;
    width: 10px; height: 10px; border-radius: 50%;
    background: #555; top: 2px; left: 2px;
    transition: left 0.2s, background 0.2s;
}
.beat-snap-toggle input:checked + .snap-pill { background: #003020; border-color: #00ff88; }
.beat-snap-toggle input:checked + .snap-pill::after { left: 16px; background: #00ff88; }

/* DOCK push up when beat bar visible */
.dock { transition: bottom 0.3s; }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: #1e1e1e; border-radius: 2px; }
</style>
</head>
<body>

<div class="drawer-overlay" id="overlay" onclick="closeDrawer()"></div>

<div class="drawer" id="drawer">
    <div class="drawer-head">
        <h2>⚡ eLRC v2.5</h2>
        <button class="close-btn" onclick="closeDrawer()">×</button>
    </div>
    <div class="drawer-body">
        <div>
            <div class="field-label">YouTube Link</div>
            <div class="url-row">
                <input type="text" id="yt-url" placeholder="https://youtu.be/..." autocomplete="off" autocorrect="off" spellcheck="false">
                <button class="btn accent" onclick="loadVideo()">Load</button>
            </div>
            <div id="status-pill">Waiting for YouTube API…</div>
        </div>
        <div class="yt-wrap"><div class="yt-box"><div id="yt-player"></div></div></div>
        <div>
            <div class="field-label">Audio File <span style="color:#00ff88;font-size:0.6rem;">for beat sync</span></div>
            <div style="display:flex;gap:8px;align-items:center;">
                <label style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 14px;font-size:0.8rem;color:var(--muted);cursor:pointer;display:block;text-align:center;" id="audio-label">
                    📂 Upload MP3 / WAV
                    <input type="file" id="audio-file" accept="audio/*" style="display:none;" onchange="loadAudioFile(this)">
                </label>
                <button class="btn" onclick="clearAudio()" id="clear-audio-btn" style="display:none;color:#ff4444;border-color:#3a1010;">✕</button>
            </div>
            <div id="audio-status" style="font-size:0.72rem;color:#555;margin-top:6px;text-align:center;display:none;"></div>
        </div>
        <div>
            <div class="field-label">Lyrics</div>
            <textarea id="raw-input" placeholder="Paste lyrics here, one line per row…"></textarea>

<script>
// ── YouTube ────────────────────────────────────────────────
var player = null, ytReady = false, pendingId = null, rafId = null;
var isPlaying = false;

window.onYouTubeIframeAPIReady = function() {
    ytReady = true;
    setStatus('✅ Ready — paste a link and tap Load', '#00cc66');
    if (pendingId) { createPlayer(pendingId); pendingId = null; }
};

function setStatus(msg, color) {
    var el = document.getElementById('status-pill');
    el.textContent = msg; el.style.color = color || '#555';
}

function extractId(url) {
    url = url.trim();
    try {
        var u = new URL(url);
        if (u.searchParams.get('v')) return u.searchParams.get('v');
        if (u.hostname === 'youtu.be') return u.pathname.slice(1).split('?')[0];
        if (u.hostname === 'music.youtube.com') return u.searchParams.get('v');
    } catch(e) {}
    if (/^[a-zA-Z0-9_-]{11}$/.test(url)) return url;
    return null;
}

function loadVideo() {
    var url = document.getElementById('yt-url').value.trim();
    if (!url) { setStatus('⚠️ Paste a YouTube link first', '#f80'); return; }
    var id = extractId(url);
    if (!id) { setStatus('❌ Cannot read video ID', '#f44'); return; }
    if (!ytReady) { pendingId = id; setStatus('⏳ API loading… will auto-load shortly', '#f80'); return; }
    if (typeof YT === 'undefined' || !YT.Player) { setStatus('⏳ YouTube API not ready yet', '#f80'); return; }
    createPlayer(id);
}

function createPlayer(id) {
    setStatus('⏳ Loading video…', '#f80');
    cancelAnimationFrame(rafId);
    if (player) { try { player.destroy(); } catch(e) {} player = null; }
    document.querySelector('.yt-box').innerHTML = '<div id="yt-player"></div>';
    player = new YT.Player('yt-player', {
        videoId: id, width: '100%', height: '100%',
        playerVars: { playsinline: 1, controls: 1, rel: 0, modestbranding: 1, enablejsapi: 1, origin: window.location.origin || '*' },
        events: {
            onReady: function() {
                setStatus('✅ Video loaded — press ▶ to play', '#00cc66');
                startLoop();
                watchPlayerForBeatSync();
            },
            onStateChange: function(e) {
                isPlaying = (e.data === 1);
                updatePlayBtn();
                // Immediately sync beat audio on state change — don't wait for interval
                if (beatAudioBuffer && beatAudioCtx) {
                    if (e.data === 1 && !beatPlaying) {
                        if (beatAudioCtx.state === 'suspended') beatAudioCtx.resume();
                        syncBeatAudio();
                    } else if (e.data !== 1 && beatPlaying) {
                        if (beatAudioSource) { try { beatAudioSource.stop(); } catch(ex) {} beatAudioSource = null; }
                        beatPlaying = false;
                    }
                }
            },
            onError: function(e) {
                var m = {2:'Bad ID',5:'HTML5 error',100:'Not found',101:'Embed disabled',150:'Embed disabled'};
                setStatus('❌ ' + (m[e.data] || 'Error ' + e.data), '#f44');
            }
        }
    });
}

function startLoop() {
    cancelAnimationFrame(rafId);
    (function loop() {
        var t = 0, d = 0;
        if (player && typeof player.getCurrentTime === 'function') {
            try { t = player.getCurrentTime(); d = player.getDuration() || 0; } catch(e) {}
        } else {
            // Audio-only mode: drive display from beat audio clock
            var bt = getBeatAudioTime();
            if (bt !== null) { t = bt; d = beatAudioBuffer ? beatAudioBuffer.duration : 0; }
        }
        document.getElementById('time-disp').textContent = fmtDisp(t);
        document.getElementById('curr-t').textContent = fmtShort(t);
        document.getElementById('dur-t').textContent  = fmtShort(d);
        var bar = document.getElementById('seek-bar');
        if (document.activeElement !== bar) { bar.max = d || 100; bar.value = t; }
        rafId = requestAnimationFrame(loop);
    })();
}

function now() {
    // If YouTube player is available and ready, use it
    if (player && typeof player.getCurrentTime === 'function') {
        try { var yt = player.getCurrentTime(); if (yt > 0 || isPlaying) return yt; } catch(e) {}
    }
    // Audio-only fallback: use the beat audio clock when no YouTube player is loaded
    var bt = getBeatAudioTime();
    if (bt !== null && bt >= 0) return bt;
    return 0;
}

// ── Play button ────────────────────────────────────────────
function playPress(e) { e.preventDefault(); document.getElementById('play-btn').classList.add('pressed'); togglePlay(); }
function playRelease(e) { e.preventDefault(); document.getElementById('play-btn').classList.remove('pressed'); }
function updatePlayBtn() {
    var btn = document.getElementById('play-btn');
    btn.textContent = isPlaying ? '⏸' : '▶';
    btn.classList.toggle('playing', isPlaying);
}
function togglePlay() {
    // Audio-only mode: no YouTube player needed when a beat file is loaded
    if (!player || typeof player.getPlayerState !== 'function') {
        if (!beatAudioBuffer || !beatAudioCtx) return;
        if (beatPlaying) {
            // Pause: stop the source and record position
            if (beatAudioSource) { try { beatAudioSource.stop(); } catch(e) {} beatAudioSource = null; }
            beatPlaying = false; isPlaying = false;
        } else {
            if (beatAudioCtx.state === 'suspended') beatAudioCtx.resume();
            syncBeatAudio();
            isPlaying = true;
        }
        updatePlayBtn(); return;
    }
    try {
        if (player.getPlayerState() === 1) { player.pauseVideo(); isPlaying = false; }
        else { player.playVideo(); isPlaying = true; }
        updatePlayBtn();
    } catch(e) {}
}

// ── Speed ──────────────────────────────────────────────────
var speeds = [0.25, 0.5, 0.75, 1.0, 1.25, 1.5, 2.0], speedIdx = 3;
var speedPopupOpen = false;

function cycleSpeed() {
    // Toggle popup
    if (speedPopupOpen) { closeSpeedPopup(); return; }
    openSpeedPopup();
}

function openSpeedPopup() {
    var existing = document.getElementById('speed-popup');
    if (existing) existing.remove();

    var popup = document.createElement('div');
    popup.id = 'speed-popup';
    popup.style.cssText = 'position:fixed;bottom:calc(90px + env(safe-area-inset-bottom));left:10px;right:10px;background:#111;border:1px solid #2a2a2a;border-radius:20px;padding:8px;display:flex;flex-wrap:wrap;gap:6px;justify-content:center;z-index:200;box-shadow:0 8px 40px rgba(0,0,0,0.95);';

    speeds.forEach(function(s, i) {
        var btn = document.createElement('button');
        btn.style.cssText = 'padding:8px 12px;border-radius:12px;border:1.5px solid ' + (i === speedIdx ? '#7777ff' : '#2a2a2a') + ';background:' + (i === speedIdx ? '#0d0d1a' : 'transparent') + ';color:' + (i === speedIdx ? '#7777ff' : '#888') + ';font-size:0.75rem;font-weight:800;cursor:pointer;font-family:var(--mono);white-space:nowrap;';
        btn.textContent = s + '×';
        btn.onclick = function() { setSpeed(i); closeSpeedPopup(); };
        popup.appendChild(btn);
    });

    document.body.appendChild(popup);
    speedPopupOpen = true;

    // Close on outside tap
    setTimeout(function() {
        document.addEventListener('click', closeSpeedOnOutside);
        document.addEventListener('touchstart', closeSpeedOnOutside);
    }, 50);
}

function closeSpeedOnOutside(e) {
    var popup = document.getElementById('speed-popup');
    var btn   = document.getElementById('speed-btn');
    if (popup && !popup.contains(e.target) && e.target !== btn) {
        closeSpeedPopup();
    }
}

function closeSpeedPopup() {
    var popup = document.getElementById('speed-popup');
    if (popup) popup.remove();
    speedPopupOpen = false;
    document.removeEventListener('click', closeSpeedOnOutside);
    document.removeEventListener('touchstart', closeSpeedOnOutside);
}

function setSpeed(idx) {
    speedIdx = idx;
    var s = speeds[speedIdx];
    document.getElementById('speed-btn').textContent = s + '×';
    if (player && typeof player.setPlaybackRate === 'function') {
        try { player.setPlaybackRate(s); } catch(e) {}
    }
}

// ── State ──────────────────────────────────────────────────
var S = { mode: 'line', lyrics: [], li: 0, wi: 0, lastTapped: null };

// Split state: which word is currently split-marked and how many taps remain
// splitState = null | { li, wi, totalParts, tappedSoFar }
var splitState = null;

function setMode(m) {
    S.mode = m;
    document.getElementById('btn-line').classList.toggle('active', m === 'line');
    document.getElementById('btn-word').classList.toggle('active', m === 'word');
    updateCtx();
}

// ── Init ───────────────────────────────────────────────────
function initLyrics() {
    var raw = document.getElementById('raw-input').value.trim();
    if (!raw) { alert('Paste lyrics first!'); return; }
    S.lyrics = []; S.li = 0; S.wi = 0; S.lastTapped = null; _prevNowId = null;
    splitState = null;
    raw.split('\n').forEach(function(l) {
        var t = l.trim(); if (!t) return;
        S.lyrics.push({
            type: 'lyric', text: t, time: null,
            // Each word: { t: text, s: startTime, e: endTime, splits: [] }
            // splits: array of {text, s} for syllable parts (populated in review)
            words: t.split(/\s+/).map(function(w) { return { t: w, s: null, e: null, splits: [] }; })
        });
    });
    renderAll();
    closeDrawer();
}

// ── Render ─────────────────────────────────────────────────
var _prevNowId = null;

function renderAll() {
    var area = document.getElementById('lyrics-area');
    area.innerHTML = ''; _prevNowId = null;

    S.lyrics.forEach(function(line, i) {
        var div = document.createElement('div');
        div.id = 'L' + i;

        if (line.type === 'music') {
            div.className = 'lyric-line music-line' + (i === S.li ? ' active' : '');
            var txt = document.createElement('span');
            txt.textContent = '♪  ♪  ♪';
            div.appendChild(txt);
            var del = document.createElement('button');
            del.className = 'music-delete'; del.textContent = '✕';
            del.addEventListener('click', (function(idx) {
                return function(e) { e.stopPropagation(); deleteMusicLine(idx); };
            })(i));
            div.appendChild(del);
        } else {
            div.className = 'lyric-line' + (i === S.li ? ' active' : '');
            if (S.mode === 'word') {
                buildWordSpans(div, line, i);
            } else {
                div.textContent = line.text;
            }
        }

        div.addEventListener('click', (function(idx) {
            return function() { jumpTo(idx, 0); };
        })(i));
        area.appendChild(div);
    });

    if (S.mode === 'word' && S.li < S.lyrics.length && S.lyrics[S.li].type === 'lyric') {
        setNow(S.li, S.wi);
    }
    scrollActive(); updateCtx();
}

function buildWordSpans(container, line, li) {
    line.words.forEach(function(w, wi) {
        var sp = document.createElement('span');
        sp.id = 'W' + li + '_' + wi;
        var cls = 'word-span';
        // Timed words always show as .past (bright trail) across all lines
        if (w.s !== null) cls += ' past';
        if (w.splits && w.splits.length > 0) cls += ' split-marked';
        sp.className = cls;
        sp.textContent = w.t;

        // Long press to mark/unmark split
        var longTimer = null;
        var longFired = false;

        function startLong(e) {
            longFired = false;
            longTimer = setTimeout(function() {
                longFired = true;
                toggleSplitMark(li, wi);
            }, 500);
        }
        function cancelLong() {
            clearTimeout(longTimer);
        }

        sp.addEventListener('touchstart', function(e) { startLong(e); }, { passive: true });
        sp.addEventListener('touchend',   function(e) { cancelLong(); });
        sp.addEventListener('touchmove',  function(e) { cancelLong(); });
        sp.addEventListener('mousedown',  function(e) { startLong(e); });
        sp.addEventListener('mouseup',    function(e) { cancelLong(); });

        sp.addEventListener('click', (function(l, w) {
            return function(e) {
                e.stopPropagation();
                if (!longFired) jumpTo(l, w);
            };
        })(li, wi));

        container.appendChild(sp);
        if (wi < line.words.length - 1) container.appendChild(document.createTextNode(' '));
    });
}

// ── Split marking ──────────────────────────────────────────
function toggleSplitMark(li, wi) {
    var word = S.lyrics[li].words[wi];
    // If already marked, clear it
    if (word.splits && word.splits.length > 0) {
        word.splits = [];
        var sp = document.getElementById('W' + li + '_' + wi);
        if (sp) sp.classList.remove('split-marked');
        // If this was the active splitState, cancel it
        if (splitState && splitState.li === li && splitState.wi === wi) {
            splitState = null;
            updateDockForSplit(false);
        }
        updateCtx();
        return;
    }
    // Mark as split — ask how many parts via inline prompt
    // Simple: default 2 parts, user can add more in review
    // We'll start with 2 parts and stamp them via music btn
    word.splits = [{ text: word.t, s: null }, { text: '', s: null }];
    var sp = document.getElementById('W' + li + '_' + wi);
    if (sp) sp.classList.add('split-marked');

    // If this is the current word being tapped, activate split mode
    if (li === S.li && wi === S.wi) {
        activateSplitState(li, wi);
    }
    updateCtx();
    // Haptic if available
    if (navigator.vibrate) navigator.vibrate(30);
}

function activateSplitState(li, wi) {
    var word = S.lyrics[li].words[wi];
    var splits = word.splits || [];
    // Resume from wherever we left off (count how many parts already have a timestamp)
    var resumeIdx = 0;
    for (var i = 0; i < splits.length; i++) {
        if (splits[i].s !== null) resumeIdx = i + 1;
        else break;
    }
    // Don't cap resumeIdx at splits.length-1 — if all parts are stamped,
    // resumeIdx == splits.length is correct (next STAMP will add a new part)
    if (resumeIdx < 0) resumeIdx = 0;
    splitState = { li: li, wi: wi, partIdx: resumeIdx };
    updateDockForSplit(true);
    updateCtx();
}

function updateDockForSplit(active) {
    var tapBtn   = document.getElementById('tap-btn');
    var musicBtn = document.getElementById('music-btn');
    if (active) {
        tapBtn.classList.add('split-mode');
        musicBtn.classList.add('split-stamp');
        musicBtn.textContent = '✂ CUT';
        musicBtn.disabled = false;
        musicBtn.style.opacity = '';
    } else {
        tapBtn.classList.remove('split-mode');
        musicBtn.classList.remove('split-stamp');
        musicBtn.textContent = '✂ CUT';
    }
}

// ── Word highlight tracker ─────────────────────────────────
function setNow(li, wi) {
    // Clear every .now span in the entire document first
    document.querySelectorAll('.word-span.now').forEach(function(el) {
        el.classList.remove('now');
        var id = el.id;
        if (id) {
            var parts = id.slice(1).split('_');
            var pli = parseInt(parts[0]), pwi = parseInt(parts[1]);
            // Restore .past on any timed word (trail persists across all lines)
            if (S.lyrics[pli] && S.lyrics[pli].words[pwi] && S.lyrics[pli].words[pwi].s !== null) {
                el.classList.add('past');
            }
        }
    });
    _prevNowId = null;

    var newId = 'W' + li + '_' + wi;
    var el = document.getElementById(newId);
    if (el) { el.classList.remove('past'); el.classList.add('now'); _prevNowId = newId; }
}

function markPast(li, wi) {
    var el = document.getElementById('W' + li + '_' + wi);
    if (el) { el.classList.remove('now'); el.classList.add('past'); }
}

// ── TAP button press/release (long press detection) ────────
var tapLongTimer = null;
var tapLongFired = false;

function tapPress(e) {
    e.preventDefault();
    if (beatAudioCtx && beatAudioCtx.state === 'suspended') beatAudioCtx.resume();
    tapLongFired = false;
    tapLongTimer = setTimeout(function() {
        tapLongFired = true;
        // Long press on TAP = insert a music/instrumental timestamp
        S.lyrics.splice(S.li, 0, { type: 'music', text: '', time: now(), words: [] });
        if (navigator.vibrate) navigator.vibrate([20, 40, 20]);
        renderAll(); genLRC();
    }, 500);
}

function tapRelease(e) {
    e.preventDefault();
    clearTimeout(tapLongTimer);
    if (!tapLongFired) handleTap();
}

// ── TAP ────────────────────────────────────────────────────
function handleTap() {
    if (!S.lyrics.length || S.li >= S.lyrics.length) return;
    renderAll();
    var t    = now();
    var line = S.lyrics[S.li];

    // LINE MODE
    if (S.mode === 'line' || line.type === 'music') {
        line.time = t; moveToNextLine(); genLRC(); return;
    }

    // WORD MODE — split mode active: TAP = advance to next word (done with this split word)
    if (splitState && splitState.li === S.li && splitState.wi === S.wi) {
        // Close the split: stamp end time for this word
        var sw = S.lyrics[S.li].words[S.wi];
        sw.e = t;
        // If any parts don't have a text yet, assign remainder of word
        autofillSplitTexts(sw);
        splitState = null;
        updateDockForSplit(false);
        markPast(S.li, S.wi);
        S.lastTapped = null;
        // VINYL: restore normal 1.0x speed now that the split word is done
        vinylRestore();
        if (navigator.vibrate) navigator.vibrate(10);
        moveToNextLine_word();
        genLRC(); updateCtx(); return;
    }

    // WORD MODE — normal
    // Close previous word end time
    if (S.lastTapped !== null) {
        S.lyrics[S.lastTapped.li].words[S.lastTapped.wi].e = snapToNearestBeat(t);
        S.lastTapped = null;
    }

    var word = line.words[S.wi];
    word.s = snapToNearestBeat(t);
    if (S.wi === 0) line.time = word.s;
    S.lastTapped = { li: S.li, wi: S.wi };
    if (navigator.vibrate) navigator.vibrate(10);
    markPast(S.li, S.wi);

    // Cascade: wipe any following words whose timestamps are now out-of-order
    cascadeConflicts(S.li, S.wi, word.s);

    if (S.wi < line.words.length - 1) {
        S.wi++;
        setNow(S.li, S.wi);
        // If next word is split-marked, activate split state
        if (S.lyrics[S.li].words[S.wi].splits && S.lyrics[S.li].words[S.wi].splits.length > 0) {
            activateSplitState(S.li, S.wi);
        }
    } else {
        moveToNextLine();
    }

    updateCtx(); genLRC();
}

function moveToNextLine_word() {
    var line = S.lyrics[S.li];
    // If there are more words in this line, go to next word
    if (line && line.type === 'lyric' && S.wi < line.words.length - 1) {
        S.wi++;
        setNow(S.li, S.wi);
        // If next word is split-marked, activate split state
        if (line.words[S.wi].splits && line.words[S.wi].splits.length > 0) {
            activateSplitState(S.li, S.wi);
        }
        updateCtx();
    } else {
        // Last word of line — go to next line
        moveToNextLine();
    }
}

function autofillSplitTexts(word) {
    var parts = word.splits;
    // Only autofill parts that have never been manually edited
    parts.forEach(function(p, i) {
        if (p.isEdited) return; // skip — user typed this manually
        if (p.text && p.text !== word.t && p.text !== '') return; // already has non-default text
        // Rough even split
        var n = parts.length;
        var chunk = Math.ceil(word.t.length / n);
        p.text = word.t.slice(i * chunk, (i+1) * chunk);
    });
}

function moveToNextLine() {
    var old = document.getElementById('L' + S.li);

            }
        }

}

// ── CUT / SPLIT-STAMP ─────────────────────────────────────
// First press on an unmarked word: auto-mark it + stamp part 1 immediately.
// Subsequent presses (splitState active): stamp next part.
// TAP closes the word and advances to the next.
// Long-press TAP: insert a music/instrumental line (unchanged).
function handleMusic() {
    var line = S.lyrics[S.li];

    // If we're already in split mode for the current word → stamp next part
    if (splitState && splitState.li === S.li && splitState.wi === S.wi) {
        handleSplitStamp(); return;
    }

    // Must be in word mode on a lyric line to cut
    if (S.mode !== 'word' || !line || line.type !== 'lyric') {
        // Fallback: insert a music/instrumental timestamp (original behaviour)
        // Guard: need lyrics loaded AND a real playback position
        if (!S.lyrics.length || S.li >= S.lyrics.length) return;
        var t0 = now();
        if (t0 <= 0) return; // no video playing — don't insert a blank timestamp
        if (S.lastTapped !== null) {
            S.lyrics[S.lastTapped.li].words[S.lastTapped.wi].e = t0;
            S.lastTapped = null;
        }
        S.lyrics.splice(S.li, 0, { type: 'music', text: '', time: t0, words: [] });
        S.li++; _prevNowId = null;
        renderAll(); genLRC();
        return;
    }

    // Auto-mark the current word as split if not already marked
    var word = line.words[S.wi];
    if (!word.splits || word.splits.length === 0) {
        word.splits = [{ text: word.t, s: null }, { text: '', s: null }];
        var sp = document.getElementById('W' + S.li + '_' + S.wi);
        if (sp) sp.classList.add('split-marked');
        if (navigator.vibrate) navigator.vibrate(30);
    }

    // Activate split state for current word then immediately fire the first stamp
    activateSplitState(S.li, S.wi);
    // VINYL: slow down uploaded audio to 0.5x with pitch drop for syllable clarity
    vinylSlowDown();
    renderAll();
    handleSplitStamp();
}

function deleteMusicLine(i) {
    S.lyrics.splice(i, 1);
    if (S.li > i) S.li--;
    if (S.li >= S.lyrics.length) S.li = Math.max(0, S.lyrics.length - 1);
    _prevNowId = null;
    renderAll(); genLRC();
}

function handleSplitStamp() {
    if (!splitState) return;
    renderAll();
    var t    = now();
    var word = S.lyrics[splitState.li].words[splitState.wi];

    // If partIdx is at or beyond current splits array length, add a new part
    if (splitState.partIdx >= word.splits.length) {
        word.splits.push({ text: '', s: null, e: null });
    }

    var part = word.splits[splitState.partIdx];
    part.s = t;

    // Set word start time on first part
    if (splitState.partIdx === 0) {
        word.s = t;
        if (splitState.wi === 0) S.lyrics[splitState.li].time = t;
        // Cascade conflicts from the word level
        cascadeConflicts(splitState.li, splitState.wi, t);
    }

    // Close end of previous part
    if (splitState.partIdx > 0) {
        word.splits[splitState.partIdx - 1].e = t;
    }

    splitState.partIdx++;

    if (navigator.vibrate) navigator.vibrate(10);

    // Keep cut btn showing ✂ CUT always — TAP is the only way to advance
    document.getElementById('music-btn').textContent = '✂ CUT';
    document.getElementById('music-btn').style.color = '';

    updateCtx();
    genLRC();
}

// ── Jump to exact line AND word ────────────────────────────
// Purely non-destructive: never wipes timestamps.
// Words keep .past until a new TAP overwrites them.
function jumpTo(li, wi) {
    _prevNowId = null;
    S.li = li; S.wi = wi;
    S.lastTapped = null;
    splitState = null; updateDockForSplit(false);

    // Update line active classes
    document.querySelectorAll('.lyric-line').forEach(function(el, i) {
        el.classList.toggle('active', i === S.li);
    });

    // Rebuild trail across ALL lines from data — no timestamp mutation
    if (S.mode === 'word') {
        document.querySelectorAll('.word-span').forEach(function(el) {
            el.classList.remove('now', 'past');
        });
        S.lyrics.forEach(function(line, lineIdx) {
            if (line.type !== 'lyric') return;
            line.words.forEach(function(w, wordIdx) {
                var sp = document.getElementById('W' + lineIdx + '_' + wordIdx);
                if (!sp) return;
                if (lineIdx === li && wordIdx === wi) {
                    sp.classList.add('now');
                    _prevNowId = 'W' + li + '_' + wi;
                } else if (w.s !== null) {
                    sp.classList.add('past');
                }
            });
        });
        // Activate split state if word is already split-marked
        if (S.lyrics[li] && S.lyrics[li].words[wi] &&
            S.lyrics[li].words[wi].splits && S.lyrics[li].words[wi].splits.length > 0) {
            activateSplitState(li, wi);
        }
    }

    scrollActive(); updateCtx(); genLRC();
}

// ── Chronological conflict cascade ─────────────────────────
// Called after stamping Word B with time T.
// Walks forward: if Word X.s <= T, wipe it and dim it (.now moves there).
// Stops as soon as a word with X.s > T is found — those stay intact.
function cascadeConflicts(li, wi, newTime) {
    var line = S.lyrics[li];
    if (!line || line.type !== 'lyric') return;
    for (var i = wi + 1; i < line.words.length; i++) {
        var fw = line.words[i];
        if (fw.s !== null && fw.s <= newTime) {
            // This word is now out-of-order — wipe it
            fw.s = null; fw.e = null;
            if (fw.splits) fw.splits.forEach(function(p) { p.s = null; p.e = null; });
            var sp = document.getElementById('W' + li + '_' + i);
            if (sp) { sp.classList.remove('past', 'now'); }
        } else {
            break; // everything beyond this is still valid
        }
    }
}

function scrollActive() {
    var el = document.getElementById('L' + S.li);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// ── Context bar ────────────────────────────────────────────
function updateCtx() {
    var bar = document.getElementById('ctx-bar');
    if (S.mode !== 'word' || !S.lyrics.length || S.li >= S.lyrics.length) { bar.classList.remove('show'); return; }
    var line = S.lyrics[S.li];
    if (!line || line.type === 'music') { bar.classList.remove('show'); return; }
    bar.classList.add('show');
    var w = line.words;
    var pastTxt = S.wi > 0 ? w[S.wi - 1].t : '';
    var nowTxt  = w[S.wi] ? w[S.wi].t : '—';
    var nextTxt = w[S.wi + 1] ? w[S.wi + 1].t : '';

    document.getElementById('ctx-past').textContent  = pastTxt;
    document.getElementById('ctx-sep-l').textContent = pastTxt ? '·' : '';
    var nowEl = document.getElementById('ctx-now');
    nowEl.textContent = nowTxt;
    document.getElementById('ctx-sep-r').textContent = nextTxt ? '·' : '';
    document.getElementById('ctx-next').textContent  = nextTxt;

    // Split info
    var infoEl = document.getElementById('ctx-split-info');
    if (splitState && splitState.li === S.li && splitState.wi === S.wi) {
        nowEl.className = 'ctx-now split-active';
        var stamped = splitState.partIdx;
        var dots = '';
        for (var i = 0; i < Math.max(stamped, 1); i++) {
            dots += i < stamped ? '●' : '○';
        }
        // Just show how many cuts made, no total fraction
        infoEl.textContent = stamped === 0
            ? ' ✂ tap STAMP to cut'
            : ' ✂ ' + stamped + ' cut' + (stamped > 1 ? 's' : '') + ' · TAP to finish';
    } else {
        nowEl.className = 'ctx-now';
        infoEl.textContent = '';
    }

}

// ── LRC ────────────────────────────────────────────────────
function genLRC() {
    var out = [];
    S.lyrics.forEach(function(line) {
        if (line.time === null) return;
        if (line.type === 'music') { out.push('[' + fmtLine(line.time) + ']'); return; }
        if (S.mode === 'line') { out.push('[' + fmtLine(line.time) + '] ' + line.text); return; }

        var parts = '';
        line.words.forEach(function(w, wi) {
            if (w.s === null) return;
            // If word has splits with timestamps, expand them
            if (w.splits && w.splits.length > 0 && w.splits[0].s !== null) {
                w.splits.forEach(function(sp, si) {
                    if (sp.s !== null) {
                        parts += '<' + fmtWord(sp.s) + '>' + (sp.text || '');
                    }
                });
                if (wi < line.words.length - 1) parts += ' ';
            } else {
                parts += '<' + fmtWord(w.s) + '>' + w.t;
                if (wi < line.words.length - 1) parts += ' ';
            }
        });
        var last = line.words[line.words.length - 1];
        if (last && last.e !== null) parts += '<' + fmtWord(last.e) + '>';
        if (parts) out.push('[' + fmtWord(line.time) + ']v1: ' + parts);
    });
    document.getElementById('lrc-out').value = out.join('\n');
    updatePreviewBtn();
}

function openReview() {
    var body = document.getElementById('review-body');

    // Collect all words with splits
    var found = false;
    S.lyrics.forEach(function(line, li) {
        if (line.type !== 'lyric') return;

            if (!word.splits || word.splits.length === 0) return;

            body.appendChild(buildReviewItem(li, wi, word, line));
        });
    });

    if (!found) {
        body.innerHTML = '<div style="text-align:center;padding:40px;color:#444;font-size:0.9rem;">No split words found.<br>Long press a word while tagging to mark it for splitting.</div>';
    }

}

function buildReviewItem(li, wi, word, line) {
    var item = document.createElement('div');
    item.className = 'split-review-item';
    item.dataset.li = li; item.dataset.wi = wi;

    // Header
    var top = document.createElement('div');
    top.className = 'sri-top';
    var wLabel = document.createElement('div');
    wLabel.className = 'sri-word';
    wLabel.textContent = '✂ ' + word.t;
    var lineRef = document.createElement('div');
    lineRef.className = 'sri-line-ref';
    lineRef.textContent = 'Line ' + (li+1) + ', word ' + (wi+1);
    top.appendChild(wLabel); top.appendChild(lineRef);
    item.appendChild(top);

    // Parts list
    var partsDiv = document.createElement('div');
    partsDiv.className = 'sri-parts';
    partsDiv.id = 'sri-parts-' + li + '_' + wi;

    // Ensure at least 2 parts
    if (word.splits.length < 2) {
        word.splits.push({ text: '', s: null, e: null });
    }

    word.splits.forEach(function(part, pi) {
        partsDiv.appendChild(buildPartRow(li, wi, pi, part, word));
    });
    item.appendChild(partsDiv);
    // Show/hide ✕ buttons correctly on initial render
    setTimeout(function() { refreshPartDeleteBtns(li, wi); }, 0);

    // Add part button
    var addBtn = document.createElement('button');
    addBtn.className = 'sri-add-part-btn';
    addBtn.textContent = '+ Add part';
    addBtn.onclick = (function(l, w) {
        return function() {
            S.lyrics[l].words[w].splits.push({ text: '', s: null, e: null });
            var pd = document.getElementById('sri-parts-' + l + '_' + w);
            var idx = S.lyrics[l].words[w].splits.length - 1;
            pd.appendChild(buildPartRow(l, w, idx, S.lyrics[l].words[w].splits[idx], S.lyrics[l].words[w]));
            refreshPartDeleteBtns(l, w);
        };
    })(li, wi);
    item.appendChild(addBtn);

    // Actions row
    var actRow = document.createElement('div');
    actRow.style.cssText = 'display:flex;gap:8px;align-items:center;flex-wrap:wrap;';

    // Seek to word button
    if (word.s !== null) {
        var seekBtn = document.createElement('button');
        seekBtn.className = 'sri-seek-btn';
        seekBtn.textContent = '▶ Jump to ' + fmtShort(word.s);
        seekBtn.onclick = (function(t) {
            return function() {
                if (player) try { player.seekTo(t - 0.5, true); } catch(e) {}
            };
        })(word.s);
        actRow.appendChild(seekBtn);
    }

    // Remove split
    var removeBtn = document.createElement('button');
    removeBtn.className = 'sri-remove-btn';
    removeBtn.textContent = 'Remove split';
    removeBtn.onclick = (function(l, w, el) {
        return function() {
            S.lyrics[l].words[w].splits = [];
            var sp = document.getElementById('W' + l + '_' + w);
            if (sp) sp.classList.remove('split-marked');
            el.remove();
            genLRC();
        };
    })(li, wi, item);
    actRow.appendChild(removeBtn);
    item.appendChild(actRow);

    return item;
}

// Show/hide ✕ buttons: only visible when there are >2 parts, and never on parts 0 and 1
function refreshPartDeleteBtns(li, wi) {
    var splits = S.lyrics[li].words[wi].splits;
    var show = splits.length > 2;
    splits.forEach(function(_, pi) {
        var btn = document.getElementById('sri-del-' + li + '_' + wi + '_' + pi);
        if (!btn) return;
        // Never show ✕ on the first two parts
        btn.style.display = (show && pi >= 2) ? 'flex' : 'none';
    });
}

function buildPartRow(li, wi, pi, part, word) {
    var row = document.createElement('div');
    row.className = 'sri-part';
    row.id = 'sri-part-' + li + '_' + wi + '_' + pi;

    var label = document.createElement('div');
    label.className = 'sri-part-label';
    label.textContent = 'Part ' + (pi+1);

    var textInput = document.createElement('input');
    textInput.className = 'sri-part-text';
    textInput.type = 'text';
    textInput.value = part.text || '';
    textInput.placeholder = 'syllable…';
    // No autocapitalize on any part
    textInput.setAttribute('autocapitalize', 'none');
    textInput.setAttribute('autocomplete', 'off');
    textInput.setAttribute('autocorrect', 'off');
    textInput.oninput = (function(l, w, p) {
        return function() {
            var val = this.value;
            if (p > 0) {
                var pos = this.selectionStart;
                val = val.toLowerCase();
                this.value = val;
                try { this.setSelectionRange(pos, pos); } catch(e) {}
            }
            S.lyrics[l].words[w].splits[p].text = val;
            S.lyrics[l].words[w].splits[p].isEdited = true; // mark as manually edited
            genLRC();
        };
    })(li, wi, pi);

    var timeSpan = document.createElement('div');
    timeSpan.className = 'sri-part-time';
    timeSpan.id = 'sri-time-' + li + '_' + wi + '_' + pi;
    timeSpan.textContent = part.s !== null ? fmtWord(part.s) : '—';

    // Nudge row + delete button
    var nudgeRow = document.createElement('div');
    nudgeRow.className = 'sri-nudge-row';

    [-0.1, +0.1].forEach(function(delta) {
        var nb = document.createElement('button');
        nb.className = 'nudge-btn';
        nb.textContent = delta > 0 ? '+0.1' : '−0.1';
        nb.onclick = (function(l, w, p, d) {
            return function() {
                if (S.lyrics[l].words[w].splits[p].s === null) return;
                S.lyrics[l].words[w].splits[p].s = Math.max(0, S.lyrics[l].words[w].splits[p].s + d);
                document.getElementById('sri-time-' + l + '_' + w + '_' + p).textContent = fmtWord(S.lyrics[l].words[w].splits[p].s);
                genLRC();
            };
        })(li, wi, pi, delta);
        nudgeRow.appendChild(nb);
    });

    // Per-part delete button (hidden on parts 0 and 1, shown when >2 parts)
    var delPartBtn = document.createElement('button');
    delPartBtn.className = 'nudge-btn';
    delPartBtn.id = 'sri-del-' + li + '_' + wi + '_' + pi;
    delPartBtn.title = 'Remove this part';
    delPartBtn.style.cssText = 'color:#ff4444;border-color:#3a1010;margin-left:4px;width:28px;display:none;';
    delPartBtn.textContent = '✕';
    delPartBtn.onclick = (function(l, w, p) {
        return function() {
            var splits = S.lyrics[l].words[w].splits;
            if (splits.length <= 2) return;
            splits.splice(p, 1);
            var pd = document.getElementById('sri-parts-' + l + '_' + w);
            if (pd) {
                pd.innerHTML = '';
                S.lyrics[l].words[w].splits.forEach(function(sp, idx) {
                    pd.appendChild(buildPartRow(l, w, idx, sp, S.lyrics[l].words[w]));
                });
            }
            refreshPartDeleteBtns(l, w);
            genLRC();
        };
    })(li, wi, pi);
    nudgeRow.appendChild(delPartBtn);

    row.appendChild(label);
    row.appendChild(textInput);
    row.appendChild(timeSpan);
    row.appendChild(nudgeRow);
    return row;
}

function applyReviewAndClose() {
    genLRC();
    // Resync splitState if it exists — review may have added/removed parts
    if (splitState) {
        var word = S.lyrics[splitState.li] && S.lyrics[splitState.li].words[splitState.wi];
        if (word && word.splits && word.splits.length > 0) {
            // Recompute partIdx from data
            var resumeIdx = 0;
            for (var i = 0; i < word.splits.length; i++) {
                if (word.splits[i].s !== null) resumeIdx = i + 1;
                else break;
            }
            if (resumeIdx >= word.splits.length) resumeIdx = word.splits.length; // allow == length (all stamped)
            splitState.partIdx = resumeIdx;
        }
    }
    closeReview();
}

// ── Time formats ───────────────────────────────────────────
function fmtDisp(s) {
    if (!s||isNaN(s)) return '00:00.00'; s=Math.max(0,s);
    return p2(Math.floor(s/60))+':'+p2(Math.floor(s%60))+'.'+p2(Math.floor((s%1)*100));
}
function fmtLine(s) {
    if (s===null||isNaN(s)) return '00:00.00'; s=Math.max(0,s);
    return p2(Math.floor(s/60))+':'+p2(Math.floor(s%60))+'.'+p2(Math.floor((s%1)*100));
}
function fmtWord(s) {
    if (s===null||isNaN(s)) return '00:00.000'; s=Math.max(0,s);
    return p2(Math.floor(s/60))+':'+p2(Math.floor(s%60))+'.'+p3(Math.floor((s%1)*1000));
}
function fmtShort(s) {
    if (!s||isNaN(s)) return '0:00';
    return Math.floor(s/60)+':'+p2(Math.floor(s%60));
}
function p2(n) { return n.toString().padStart(2,'0'); }
function p3(n) { return n.toString().padStart(3,'0'); }

    startPreviewLoop();
}

function closePreview() {
    document.getElementById('preview-overlay').classList.remove('open');
    cancelAnimationFrame(previewRafId);
    previewRafId = null;
}
function togglePreview() {
    var isOpen = document.getElementById('preview-overlay').classList.contains('open');
    if (isOpen) closePreview(); else openPreview();
}

function redoLine(li) {
    var line = S.lyrics[li];
    if (!line || line.type !== 'lyric') return;
    var seekTo = line.time !== null ? Math.max(0, line.time - 1.5) : null;
    // Explicitly wipe all timestamps for this line (jumpTo is now non-destructive)
    line.time = null;
    line.words.forEach(function(w) {
        w.s = null; w.e = null;
        if (w.splits) w.splits.forEach(function(p) { p.s = null; p.e = null; });
    });
    closePreview();
    jumpTo(li, 0);
    setTimeout(function() {
        if (seekTo !== null && player) {
            try {
                player.seekTo(seekTo, true);
                player.playVideo();
                isPlaying = true;
                updatePlayBtn();
            } catch(e) {}
        }
    }, 80);
}

function startPreviewLoop() {
    cancelAnimationFrame(previewRafId);
    var lastActiveLi = -1;
    (function loop() {
        if (!document.getElementById('preview-overlay').classList.contains('open')) {
            previewRafId = null; return;
        }
        var t = now();

        // Find active line index
        var activeLi = -1;
        S.lyrics.forEach(function(line, li) {
            if (line.time !== null && t >= line.time) activeLi = li;
        });

        // Scroll when line changes
        if (activeLi !== lastActiveLi) {
            if (activeLi >= 0) {
                var el = document.getElementById('pl-' + activeLi);
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
            lastActiveLi = activeLi;
        }

        // ── LINE MODE ──────────────────────────────────────────
        if (S.mode === 'line') {
            S.lyrics.forEach(function(line, li) {
                if (line.type !== 'lyric' || line.time === null) return;
                var el = document.getElementById('pkl-' + li);
                if (!el) return;
                var fill = el.querySelector('.pk-fill');
                if (!fill) return;

                if (li !== activeLi) {
                    // Not current line — dim, no fill
                    fill.style.width = '0%';
                    return;
                }

                // Current line — find next line time for sweep duration
                var nextTime = null;
                for (var ni = li + 1; ni < S.lyrics.length; ni++) {
                    if (S.lyrics[ni].time !== null) { nextTime = S.lyrics[ni].time; break; }
                }

                if (nextTime !== null && nextTime > line.time) {
                    var progress = (t - line.time) / (nextTime - line.time);
                    var eased = progress < 0.5
                        ? 2 * progress * progress
                        : -1 + (4 - 2 * progress) * progress;
                    fill.style.width = Math.min(100, eased * 100).toFixed(1) + '%';
                } else {
                    // Last line — sweep to full over ~3s
                    var dur = 3;
                    var p = Math.min(1, (t - line.time) / dur);
                    fill.style.width = (p * 100).toFixed(1) + '%';
                }
            });
        }

        // ── WORD MODE ──────────────────────────────────────────
        if (S.mode !== 'line') {
            S.lyrics.forEach(function(line, li) {
                if (line.type !== 'lyric') return;
                line.words.forEach(function(word, wi) {
                    var el = document.getElementById('pkw-' + li + '_' + wi);
                    if (!el) return;
                    var fill = el.querySelector('.pk-fill');
                    if (!fill) return;

                    // Non-active line: always no fill — no ghost highlights
                    if (li !== activeLi) { fill.style.width = '0%'; return; }

                    // Word not yet started, or no timestamp — no fill
                    if (word.s === null || t < word.s) { fill.style.width = '0%'; return; }

                    // Word fully passed (has end time and we're past it)
                    if (word.e !== null && t >= word.e) {
                        fill.style.width = '100%';
                        return;
                    }

                    // Word in progress — sweep between s and e
                    if (word.e !== null && word.e > word.s) {
                        var progress = (t - word.s) / (word.e - word.s);
                        var eased = progress < 0.5
                            ? 2 * progress * progress
                            : -1 + (4 - 2 * progress) * progress;
                        fill.style.width = Math.min(100, Math.max(0, eased * 100)).toFixed(1) + '%';
                    } else {
                        // No end time yet — word is active, show full
                        fill.style.width = '100%';
                    }
                });
            });
        }

        previewRafId = requestAnimationFrame(loop);
    })();
}

// Enable preview button once lyrics are loaded
function updatePreviewBtn() {
    var btn = document.getElementById('preview-btn');
    if (!btn) return;
    var hasAny = S.lyrics.some(function(l) { return l.time !== null; });
    btn.style.opacity = hasAny ? '' : '0.4';
    btn.style.pointerEvents = hasAny ? '' : 'none';
}

// ── BEAT ENGINE ───────────────────────────────────────────
var beatAudioCtx = null;
var beatAudioBuffer = null;
var beatAudioSource = null;
var beatTimes = [];        // array of beat timestamps in seconds
var beatBpm = 0;
var beatStartedAt = null;  // when audio source started (AudioContext.currentTime)
var beatStartOffset = 0;   // offset within buffer when started
var beatPlaying = false;
var beatRafId = null;
var beatPcm = null;        // Float32Array of mono PCM samples
var beatSampleRate = 0;

// ── VINYL SLOWDOWN ─────────────────────────────────────────
// NOTE: preservesPitch / pitch-dropping works ONLY on the uploaded audio file
// (beatAudioSource / vinylSource). The YouTube iframe player has no API for
// disabling pitch preservation — this effect cannot be applied to it.
var vinylSource = null;   // separate audible source used only during syllable stamping

function loadAudioFile(input) {
    var file = input.files[0];
    if (!file) return;
    var label = document.getElementById('audio-label');
    var status = document.getElementById('audio-status');
    var clearBtn = document.getElementById('clear-audio-btn');

    label.innerHTML = '⏳ Analyzing…<input type="file" id="audio-file" accept="audio/*" style="display:none;" onchange="loadAudioFile(this)">';
    status.style.display = 'block';
    status.textContent = 'Decoding audio…';
    status.style.color = '#555';

    var reader = new FileReader();
    reader.onload = function(e) {
        if (!beatAudioCtx) beatAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
        beatAudioCtx.decodeAudioData(e.target.result, function(buffer) {
            beatAudioBuffer = buffer;
            beatSampleRate = buffer.sampleRate;

            // Flatten to mono
            var ch0 = buffer.getChannelData(0);
            var ch1 = buffer.numberOfChannels > 1 ? buffer.getChannelData(1) : null;
            beatPcm = new Float32Array(ch0.length);
            for (var i = 0; i < ch0.length; i++) {
                beatPcm[i] = ch1 ? (ch0[i] + ch1[i]) * 0.5 : ch0[i];
            }

            status.textContent = 'Detecting beats…';
            setTimeout(function() {
                detectBeats();
                label.innerHTML = '✅ ' + file.name.substring(0, 24) + (file.name.length > 24 ? '…' : '') +
                    '<input type="file" id="audio-file" accept="audio/*" style="display:none;" onchange="loadAudioFile(this)">';
                clearBtn.style.display = '';
                status.textContent = beatBpm > 0 ? beatBpm.toFixed(1) + ' BPM detected — ' + beatTimes.length + ' beats' : 'BPM detected';
                status.style.color = '#00ff88';
                document.getElementById('beat-bar').classList.add('visible');
                document.getElementById('beat-bpm-label').textContent = beatBpm.toFixed(1) + ' BPM';
                startBeatVisualization();
                // Audio-only mode: start the display loop so time updates without YouTube
                startLoop();
            }, 50);
        }, function() {
            status.textContent = '❌ Could not decode audio';
            status.style.color = '#ff4444';
            label.innerHTML = '📂 Upload MP3 / WAV<input type="file" id="audio-file" accept="audio/*" style="display:none;" onchange="loadAudioFile(this)">';
        });
    };
    reader.readAsArrayBuffer(file);
}

function clearAudio() {
    if (beatAudioSource) { try { beatAudioSource.stop(); } catch(e) {} beatAudioSource = null; }
    beatAudioBuffer = null; beatPcm = null; beatTimes = []; beatBpm = 0; beatPlaying = false;
    beatStartedAt = null;
    cancelAnimationFrame(beatRafId);
    document.getElementById('beat-bar').classList.remove('visible');
    document.getElementById('clear-audio-btn').style.display = 'none';
    document.getElementById('audio-status').style.display = 'none';
    document.getElementById('audio-label').innerHTML = '📂 Upload MP3 / WAV<input type="file" id="audio-file" accept="audio/*" style="display:none;" onchange="loadAudioFile(this)">';
    document.getElementById('beat-bpm-label').textContent = '-- BPM';
}

function detectBeats() {
    // Energy-based onset detection with adaptive threshold
    var sr = beatSampleRate;
    var hopSize = Math.floor(sr * 0.01);   // 10ms hops
    var winSize = Math.floor(sr * 0.05);   // 50ms window
    var samples = beatPcm;
    var energies = [];

    for (var i = 0; i + winSize < samples.length; i += hopSize) {
        var e = 0;
        for (var j = i; j < i + winSize; j++) e += samples[j] * samples[j];
        energies.push(e / winSize);
    }

    // Compute difference function (flux)
    var flux = [];
    for (var i = 1; i < energies.length; i++) {
        var d = energies[i] - energies[i-1];
        flux.push(d > 0 ? d : 0);
    }

    // Adaptive threshold — local mean * 1.5
    var winFrames = 43; // ~430ms window
    var onsets = [];
    for (var i = winFrames; i < flux.length - winFrames; i++) {
        var localMean = 0;
        for (var j = i - winFrames; j < i + winFrames; j++) localMean += flux[j];
        localMean /= (winFrames * 2);
        if (flux[i] > localMean * 1.5 && flux[i] > flux[i-1] && flux[i] >= flux[i+1]) {
            var t = (i * hopSize) / sr;
            // Minimum gap between beats: 0.25s (240 BPM max)
            if (onsets.length === 0 || t - onsets[onsets.length-1] > 0.25) {
                onsets.push(t);
            }
        }
    }

    beatTimes = onsets;

    // Estimate BPM from inter-beat intervals
    if (onsets.length > 4) {
        var ibis = [];
        for (var i = 1; i < Math.min(onsets.length, 64); i++) ibis.push(onsets[i] - onsets[i-1]);
        ibis.sort(function(a,b){return a-b;});
        var median = ibis[Math.floor(ibis.length/2)];
        beatBpm = 60 / median;
        // Normalize to 60-180 BPM range
        while (beatBpm > 180) beatBpm /= 2;
        while (beatBpm < 60)  beatBpm *= 2;
    }
}

function getBeatAudioTime() {
    if (!beatPlaying || !beatAudioCtx || beatStartedAt === null) return null;
    return beatStartOffset + (beatAudioCtx.currentTime - beatStartedAt);
}

function snapToNearestBeat(t) {
    if (!document.getElementById('snap-toggle').checked) return t;
    if (beatTimes.length === 0) return t;
    // Find nearest beat within ±200ms
    var best = null, bestDist = 0.2;
    for (var i = 0; i < beatTimes.length; i++) {
        var d = Math.abs(beatTimes[i] - t);
        if (d < bestDist) { bestDist = d; best = beatTimes[i]; }
    }
    return best !== null ? best : t;
}

// Sync audio with YouTube player
function syncBeatAudio() {
    if (!beatAudioBuffer || !beatAudioCtx) return;
    var ytTime = now();
    if (ytTime <= 0) return;

    if (beatAudioSource) { try { beatAudioSource.stop(); } catch(e) {} beatAudioSource = null; }

    beatAudioSource = beatAudioCtx.createBufferSource();
    beatAudioSource.buffer = beatAudioBuffer;
    // Connect to a gain node at 0 — we don't want to hear it, just use for timing
    var gain = beatAudioCtx.createGain();
    gain.gain.value = 0;
    beatAudioSource.connect(gain);
    gain.connect(beatAudioCtx.destination);

    var offset = Math.max(0, ytTime);
    beatStartOffset = offset;
    beatStartedAt = beatAudioCtx.currentTime;
    beatPlaying = true;
    beatAudioSource.start(0, offset);
    beatAudioSource.onended = function() { beatPlaying = false; };
}

// ── BEAT VISUALIZATION ────────────────────────────────────

// ── VINYL SLOWDOWN HELPERS ────────────────────────────────
// Called on CUT: spawns an audible 0.5× source so the pitch drops ("vinyl" effect).
// Only works on the uploaded audio file — YouTube iframe has no pitch-disable API.
function vinylSlowDown() {
    if (!beatAudioBuffer || !beatAudioCtx) return;
    var t = getBeatAudioTime();
    if (t === null) t = now();
    if (t <= 0) return;

    // Tear down any previous vinyl source
    if (vinylSource) { try { vinylSource.stop(); } catch(e) {} vinylSource = null; }

    vinylSource = beatAudioCtx.createBufferSource();
    vinylSource.buffer = beatAudioBuffer;

    // Drop to half speed — allow pitch to fall naturally (the "vinyl" effect)
    vinylSource.playbackRate.value = 0.5;
    // Disable pitch preservation so the voice deepens instead of staying robotic
    if ('preservesPitch' in vinylSource) vinylSource.preservesPitch = false;
    else if ('mozPreservesPitch' in vinylSource) vinylSource.mozPreservesPitch = false;

    vinylSource.connect(beatAudioCtx.destination);
    vinylSource.start(0, Math.max(0, t));
    vinylSource.onended = function() { vinylSource = null; };
}

// Called on TAP: stops the slow vinyl source and restores normal beat-sync playback.
function vinylRestore() {
    if (vinylSource) {
        try { vinylSource.stop(); } catch(e) {}
        vinylSource = null;
    }
    // Re-sync the silent beat-timing source at normal speed
    if (beatAudioBuffer && beatAudioCtx && beatPlaying) {
        syncBeatAudio();
    }
}

function startBeatVisualization() {
    cancelAnimationFrame(beatRafId);
    var canvas = document.getElementById('beat-canvas');
    var wrap = canvas.parentElement;

    function resize() {
        canvas.width = wrap.offsetWidth * window.devicePixelRatio;
        canvas.height = wrap.offsetHeight * window.devicePixelRatio;
    }
    resize();
    window.addEventListener('resize', resize);

    var ctx = canvas.getContext('2d');
    var lastBeatIdx = -1;
    var pulseAmt = 0;

    (function frame() {
        beatRafId = requestAnimationFrame(frame);
        var W = canvas.width, H = canvas.height;
        var dpr = window.devicePixelRatio || 1;
        ctx.clearRect(0, 0, W, H);

        // Get current time — prefer beat audio clock, fall back to YouTube
        var t = getBeatAudioTime();
        if (t === null) t = now();
        if (t < 0) t = 0;

        var duration = beatAudioBuffer ? beatAudioBuffer.duration : 0;
        if (duration <= 0) return;

        // ── Draw waveform (downsampled) ──
        if (beatPcm) {
            var viewDur = 8; // seconds visible
            var halfDur = viewDur / 2;
            var startSec = Math.max(0, t - halfDur);
            var endSec = Math.min(duration, t + halfDur);
            var startSamp = Math.floor(startSec * beatSampleRate);
            var endSamp = Math.floor(endSec * beatSampleRate);
            var totalSamps = endSamp - startSamp;
            var cols = Math.floor(W);
            var sampsPerCol = Math.max(1, Math.floor(totalSamps / cols));

            ctx.strokeStyle = 'rgba(255,255,255,0.08)';
            ctx.lineWidth = 1;
            for (var col = 0; col < cols; col++) {
                var s0 = startSamp + col * sampsPerCol;
                var s1 = Math.min(endSamp, s0 + sampsPerCol);
                var peak = 0;
                for (var s = s0; s < s1; s++) {
                    var v = Math.abs(beatPcm[s]);
                    if (v > peak) peak = v;
                }
                var h = peak * (H * 0.85);
                var cy = H / 2;
                ctx.beginPath();
                ctx.moveTo(col, cy - h);
                ctx.lineTo(col, cy + h);
                ctx.stroke();
            }
        }

        // ── Draw beat markers ──
        var viewDur = 8;
        var halfDur = viewDur / 2;
        for (var i = 0; i < beatTimes.length; i++) {
            var bt = beatTimes[i];
            if (bt < t - halfDur || bt > t + halfDur) continue;
            var x = ((bt - (t - halfDur)) / viewDur) * W;
            var isPast = bt < t;
            var isNear = Math.abs(bt - t) < 0.08; // within 80ms = "now"

            if (isNear) {
                // Pulse glow
                ctx.strokeStyle = 'rgba(0,255,136,0.9)';
                ctx.lineWidth = 2 * dpr;
                pulseAmt = 1.0;
                if (lastBeatIdx !== i) {
                    lastBeatIdx = i;
                    if (navigator.vibrate) navigator.vibrate(10);
                }
            } else if (isPast) {
                ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                ctx.lineWidth = 1;
            } else {
                ctx.strokeStyle = 'rgba(255,255,255,0.35)';
                ctx.lineWidth = 1;
            }
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, H);
            ctx.stroke();
        }

        // ── Playhead line ──
        var px = (halfDur / viewDur) * W;
        ctx.strokeStyle = 'rgba(255,255,255,0.6)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(px, 0);
        ctx.lineTo(px, H);
        ctx.stroke();

        // ── Pulse overlay ──
        if (pulseAmt > 0) {
            ctx.fillStyle = 'rgba(0,255,136,' + (pulseAmt * 0.12) + ')';
            ctx.fillRect(0, 0, W, H);
            pulseAmt = Math.max(0, pulseAmt - 0.06);
        }
    })();
}

// Watch YouTube player state to sync beat audio
var beatSyncInterval = null;
function watchPlayerForBeatSync() {
    if (beatSyncInterval) clearInterval(beatSyncInterval);
    // Fallback interval only for re-sync after seeking (not for play/pause — that's handled in onStateChange)
    beatSyncInterval = setInterval(function() {
        if (!beatAudioBuffer || !beatAudioCtx || !beatPlaying) return;
        // Re-sync if drift is more than 0.5s
        var beatT = getBeatAudioTime();
        var ytT = now();
        if (beatT !== null && Math.abs(beatT - ytT) > 0.5) {
            syncBeatAudio();
        }
    }, 1000);
}

// ── Keyboard ───────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
    if (e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT') return;
    if (e.code==='Space')      { e.preventDefault(); togglePlay(); }
    if (e.code==='Enter')      { e.preventDefault(); handleTap(); }
    if (e.code==='ArrowRight') seekBy(5);
    if (e.code==='ArrowLeft')  seekBy(-5);
    if (e.code==='KeyM')       handleMusic();
});

// Close review overlay on background tap
document.getElementById('review-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeReview();
});
</script>
