<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>eLRC v2</title>
<script src="https://www.youtube.com/iframe_api"></script>
<style>
:root {
    --bg: #000;
    --surface: #111;
    --border: #2a2a2a;
    --accent: #fff;
    --muted: #555;
    --green: #00ff88;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --mono: 'Courier New', monospace;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
body {
    background: var(--bg); color: #eee; font-family: var(--font);
    height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column;
}

/* TOPBAR */
.topbar {
    height: 56px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.time-disp { font-family: var(--mono); font-size: 1rem; font-weight: 700; color: #fff; letter-spacing: 1px; }

/* BUTTONS */
.btn {
    background: var(--surface); border: 1px solid var(--border); color: #fff;
    padding: 10px 16px; border-radius: 50px; font-size: 0.8rem; font-weight: 700;
    cursor: pointer; font-family: var(--font); white-space: nowrap;
}
.btn:active { background: #222; }
.btn.accent { background: #fff; color: #000; border-color: #fff; }
.btn.accent:active { background: #ddd; }

/* DRAWER */
.drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; display: none; }
.drawer-overlay.open { display: block; }
.drawer {
    position: fixed; top: 0; left: 0; bottom: 0; width: min(88vw, 360px);
    background: #0a0a0a; border-right: 1px solid var(--border); z-index: 300;
    transform: translateX(-100%); transition: transform 0.3s ease;
    display: flex; flex-direction: column; overflow: hidden;
}
.drawer.open { transform: translateX(0); }
.drawer-head {
    padding: 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.drawer-head h2 { font-size: 1rem; font-weight: 900; }
.close-btn {
    width: 32px; height: 32px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 50%; color: #fff; font-size: 1.2rem;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
}
.drawer-body {
    flex: 1; overflow-y: auto; padding: 16px 20px;
    display: flex; flex-direction: column; gap: 18px;
    padding-bottom: calc(20px + env(safe-area-inset-bottom));
}
.field-label { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 6px; }
.url-row { display: flex; gap: 8px; }
.url-row input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    color: #fff; padding: 11px 14px; border-radius: 12px; font-size: 0.85rem; font-family: var(--font);
}
#status-pill {
    font-size: 0.75rem; padding: 6px 12px; border-radius: 50px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--muted); text-align: center; margin-top: 8px;
}
.yt-box { background: #000; border: 1px solid var(--border); border-radius: 14px; overflow: hidden; height: 175px; }
textarea {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    color: #fff; padding: 12px 14px; border-radius: 12px;
    font-size: 0.82rem; font-family: var(--mono); resize: none; height: 130px; line-height: 1.5;
}
textarea::placeholder { color: var(--muted); }
.mode-toggle { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: 50px; padding: 3px; gap: 3px; }
.mode-btn {
    flex: 1; padding: 9px; border-radius: 50px; border: none;
    background: transparent; color: var(--muted); font-size: 0.8rem; font-weight: 700;
    cursor: pointer; font-family: var(--font); transition: 0.15s;
}
.mode-btn.active { background: #333; color: #fff; }
.lrc-out-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
#lrc-out { height: 90px; border: none; background: transparent; color: var(--green); font-size: 0.72rem; padding: 10px 12px; width: 100%; resize: none; font-family: var(--mono); }
.export-btns { display: flex; gap: 8px; padding: 10px; border-top: 1px solid var(--border); }
.export-btns .btn { flex: 1; text-align: center; }

/* LYRICS */
.lyrics-area {
    flex: 1; overflow-y: auto; padding: 50px 0 300px;
    -webkit-overflow-scrolling: touch;
}
.lyric-line {
    padding: 10px 24px; font-size: 1.4rem; font-weight: 700;
    color: rgba(255,255,255,0.18); line-height: 1.6;
    transform: scale(0.95); transform-origin: left center;
    border-radius: 14px; margin: 2px 8px; cursor: pointer;
    transition: color 0.2s, transform 0.2s;
}
.lyric-line.active { color: rgba(255,255,255,0.85); transform: scale(1); }
.lyric-line.music-line { font-size: 0.95rem; color: rgba(255,255,255,0.1); font-style: italic; letter-spacing: 3px; }
.lyric-line.music-line.active { color: rgba(255,255,255,0.35); }

/* WORD SPANS - simple 3-state */
.word-span {
    display: inline;
    border-radius: 5px;
    padding: 1px 1px;
    /* default = future word = very dim */
    color: rgba(255,255,255,0.18);
}
/* past word */
.word-span.past { color: rgba(255,255,255,0.42); }
/* current word - only ONE at a time */
.word-span.now {
    color: #ffffff;
    background: rgba(255,255,255,0.14);
    padding: 1px 5px;
}

/* CONTEXT BAR */
.ctx-bar {
    position: fixed; top: 62px; left: 50%; transform: translateX(-50%);
    background: #111; border: 1px solid #333; border-radius: 50px;
    padding: 5px 16px; font-size: 0.78rem; font-weight: 700;
    display: flex; align-items: center; gap: 10px; z-index: 40;
    opacity: 0; pointer-events: none; transition: opacity 0.2s; white-space: nowrap;
}
.ctx-bar.show { opacity: 1; }
.ctx-past { color: #444; }
.ctx-now  { color: #fff; font-size: 0.9rem; }
.ctx-next { color: #444; }

/* DOCK */
.dock {
    position: fixed; bottom: calc(14px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
    width: calc(100% - 20px); max-width: 520px;
    background: #111; border: 1px solid #2a2a2a; border-radius: 32px;
    padding: 12px; display: flex; flex-direction: column; gap: 10px;
    z-index: 50; box-shadow: 0 8px 40px rgba(0,0,0,0.95);
}
.seek-row { display: flex; align-items: center; gap: 10px; font-family: var(--mono); font-size: 0.7rem; color: var(--muted); }
input[type=range] { flex: 1; -webkit-appearance: none; background: #2a2a2a; height: 3px; border-radius: 2px; border: none; padding: 0; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #fff; border-radius: 50%; }
.ctrl-row { display: flex; align-items: center; gap: 7px; }
.play-btn {
    width: 52px; height: 52px; border-radius: 50%; background: #fff; color: #000;
    font-size: 1.3rem; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; border: none; cursor: pointer;
}
.play-btn:active { background: #ccc; }
.tap-btn {
    flex: 2; height: 52px; background: #1c1c1c; border: 1.5px solid #333;
    border-radius: 26px; color: #fff; font-size: 1rem; font-weight: 800;
    letter-spacing: 1px; cursor: pointer; font-family: var(--font);
    touch-action: manipulation; user-select: none; -webkit-user-select: none;
}
.tap-btn:active { background: #fff; color: #000; border-color: #fff; }
.music-btn {
    flex: 1; height: 52px; background: #081208; border: 1.5px solid #183018;
    border-radius: 26px; color: #00bb55; font-size: 0.72rem; font-weight: 800;
    cursor: pointer; font-family: var(--font);
    touch-action: manipulation; user-select: none; -webkit-user-select: none;
}
.music-btn:active { background: #00bb55; color: #000; }
.seek-btn {
    width: 46px; height: 52px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 13px; color: #fff; font-size: 0.78rem; font-weight: 700;
    cursor: pointer; font-family: var(--font); flex-shrink: 0; touch-action: manipulation;
}
.seek-btn:active { background: #222; }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: #1e1e1e; border-radius: 2px; }
</style>
</head>
<body>

<div class="drawer-overlay" id="overlay" onclick="closeDrawer()"></div>

<div class="drawer" id="drawer">
    <div class="drawer-head">
        <h2>⚡ eLRC v2</h2>
        <button class="close-btn" onclick="closeDrawer()">×</button>
    </div>
    <div class="drawer-body">
        <div>
            <div class="field-label">YouTube Link</div>
            <div class="url-row">
                <input type="text" id="yt-url" placeholder="https://youtu.be/..." autocomplete="off" autocorrect="off" spellcheck="false">
                <button class="btn accent" onclick="loadVideo()">Load</button>
            </div>
            <div id="status-pill">Waiting for YouTube API…</div>
        </div>

        <div class="yt-box"><div id="yt-player"></div></div>

        <div>
            <div class="field-label">Sync Mode</div>
            <div class="mode-toggle">
                <button class="mode-btn active" id="btn-line" onclick="setMode('line')">Line by Line</button>
                <button class="mode-btn" id="btn-word" onclick="setMode('word')">Word by Word</button>
            </div>
        </div>

        <div>
            <div class="field-label">Paste Lyrics</div>
            <textarea id="raw-input" placeholder="Paste your lyrics here…"></textarea>
            <button class="btn" style="width:100%; margin-top:8px;" onclick="initLyrics()">Apply Lyrics</button>
        </div>

        <div>
            <div class="field-label">LRC Output</div>
            <div class="lrc-out-box">
                <textarea id="lrc-out" readonly placeholder="Output appears here as you sync…"></textarea>
                <div class="export-btns">
                    <button class="btn accent" onclick="copyLRC()">Copy LRC</button>
                    <button class="btn" onclick="downloadLRC()">Download</button>
                </div>
            </div>
        </div>

        <div style="text-align:center; color:#222; font-size:0.65rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; padding-top:10px; border-top:1px solid #111;">
            Created by Noob.exe
        </div>
    </div>
</div>

<div class="topbar">
    <button class="btn" onclick="openDrawer()">☰ Menu</button>
    <div class="time-disp" id="time-disp">00:00.00</div>
    <div style="width:72px"></div>
</div>

<!-- word context bar -->
<div class="ctx-bar" id="ctx-bar">
    <span class="ctx-past" id="ctx-past"></span>
    <span class="ctx-now"  id="ctx-now"></span>
    <span class="ctx-next" id="ctx-next"></span>
</div>

<div class="lyrics-area" id="lyrics-area">
    <div style="text-align:center; padding:80px 30px; color:#1e1e1e;">
        <div style="font-size:2rem; margin-bottom:10px;">🎵</div>
        <div style="font-weight:700;">Open Menu to begin</div>
    </div>
</div>

<div class="dock">
    <div class="seek-row">
        <span id="curr-t">0:00</span>
        <input type="range" id="seek-bar" value="0" step="0.1" oninput="seekBar()">
        <span id="dur-t">0:00</span>
    </div>
    <div class="ctrl-row">
        <button class="play-btn" id="play-btn" onclick="togglePlay()">▶</button>
        <button class="seek-btn" onclick="seekBy(-5)">−5s</button>
        <button class="tap-btn" onclick="handleTap()">TAP</button>
        <button class="music-btn" onclick="handleMusic()">♪ MUSIC</button>
        <button class="seek-btn" onclick="seekBy(5)">+5s</button>
    </div>
</div>

<script>
// ── YouTube ────────────────────────────────────────────────
var player = null, ytReady = false, pendingId = null, rafId = null;

window.onYouTubeIframeAPIReady = function() {
    ytReady = true;
    setStatus('✅ Ready — paste a link and tap Load', '#00cc66');
    if (pendingId) { createPlayer(pendingId); pendingId = null; }
};

function setStatus(msg, color) {
    var el = document.getElementById('status-pill');
    el.textContent = msg; el.style.color = color || '#555';
}

function extractId(url) {
    url = url.trim();
    try {
        var u = new URL(url);
        if (u.searchParams.get('v')) return u.searchParams.get('v');
        if (u.hostname === 'youtu.be') return u.pathname.slice(1).split('?')[0];
        if (u.hostname === 'music.youtube.com') return u.searchParams.get('v');
    } catch(e) {}
    if (/^[a-zA-Z0-9_-]{11}$/.test(url)) return url;
    return null;
}

function loadVideo() {
    var url = document.getElementById('yt-url').value.trim();
    if (!url) { setStatus('⚠️ Paste a YouTube link first', '#f80'); return; }
    var id = extractId(url);
    if (!id) { setStatus('❌ Cannot read video ID', '#f44'); return; }
    if (!ytReady) { pendingId = id; setStatus('⏳ API loading… will auto-load shortly', '#f80'); return; }
    createPlayer(id);
}

function createPlayer(id) {
    setStatus('⏳ Loading video…', '#f80');
    cancelAnimationFrame(rafId);
    if (player) { try { player.destroy(); } catch(e) {} player = null; }
    document.querySelector('.yt-box').innerHTML = '<div id="yt-player"></div>';
    player = new YT.Player('yt-player', {
        videoId: id, width: '100%', height: '100%',
        playerVars: { playsinline: 1, controls: 1, rel: 0, modestbranding: 1 },
        events: {
            onReady: function() { setStatus('✅ Video loaded — press ▶ to play', '#00cc66'); startLoop(); },
            onStateChange: function(e) { document.getElementById('play-btn').textContent = e.data === 1 ? '⏸' : '▶'; },
            onError: function(e) {
                var m = {2:'Bad ID',5:'HTML5 error',100:'Not found',101:'Embed disabled',150:'Embed disabled'};
                setStatus('❌ ' + (m[e.data] || 'Error ' + e.data), '#f44');
            }
        }
    });
}

function startLoop() {
    cancelAnimationFrame(rafId);
    (function loop() {
        if (player && typeof player.getCurrentTime === 'function') {
            try {
                var t = player.getCurrentTime(), d = player.getDuration() || 0;
                document.getElementById('time-disp').textContent = fmtDisp(t);
                document.getElementById('curr-t').textContent = fmtShort(t);
                document.getElementById('dur-t').textContent  = fmtShort(d);
                var bar = document.getElementById('seek-bar');
                if (document.activeElement !== bar) { bar.max = d || 100; bar.value = t; }
            } catch(e) {}
        }
        rafId = requestAnimationFrame(loop);
    })();
}

function now() {
    if (!player || typeof player.getCurrentTime !== 'function') return 0;
    try { return player.getCurrentTime(); } catch(e) { return 0; }
}

// ── State ──────────────────────────────────────────────────
// lyrics[] = array of { type:'lyric'|'music', text, time, words:[{t,s,e}] }
// cursor: lineIdx, wordIdx
// lastWordRef: { li, wi } = last word we tapped (needs .e closed on next tap)
var S = {
    mode: 'line',
    lyrics: [],
    li: 0,   // current line index
    wi: 0,   // current word index
    last: null  // { li, wi } of last tapped word (to close its .e)
};

// ── Mode ───────────────────────────────────────────────────
function setMode(m) {
    S.mode = m;
    document.getElementById('btn-line').classList.toggle('active', m === 'line');
    document.getElementById('btn-word').classList.toggle('active', m === 'word');
    updateCtx();
}

// ── Init ───────────────────────────────────────────────────
function initLyrics() {
    var raw = document.getElementById('raw-input').value.trim();
    if (!raw) { alert('Paste lyrics first!'); return; }
    S.lyrics = []; S.li = 0; S.wi = 0; S.last = null;
    raw.split('\n').forEach(function(l) {
        var t = l.trim();
        if (!t) return;
        S.lyrics.push({
            type: 'lyric', text: t, time: null,
            words: t.split(/\s+/).map(function(w) { return { t: w, s: null, e: null }; })
        });
    });
    renderAll();
    closeDrawer();
}

// ── Full render ────────────────────────────────────────────
function renderAll() {
    var area = document.getElementById('lyrics-area');
    area.innerHTML = '';
    S.lyrics.forEach(function(line, i) {
        var div = document.createElement('div');
        div.id  = 'L' + i;

        if (line.type === 'music') {
            div.className = 'lyric-line music-line' + (i === S.li ? ' active' : '');
            div.textContent = '♪  ♪  ♪';
        } else {
            div.className = 'lyric-line' + (i === S.li ? ' active' : '');
            if (S.mode === 'word') {
                buildWordSpans(div, line, i);
            } else {
                div.textContent = line.text;
            }
        }
        div.addEventListener('click', function() { jumpTo(i); });
        area.appendChild(div);
    });
    scrollActive();
    updateCtx();
}

function buildWordSpans(div, line, li) {
    line.words.forEach(function(w, wi) {
        var sp = document.createElement('span');
        sp.id = 'W' + li + '_' + wi;
        sp.className = 'word-span';
        applyWordClass(sp, li, wi, w);
        sp.textContent = w.t;
        div.appendChild(sp);
        if (wi < line.words.length - 1) div.appendChild(document.createTextNode(' '));
    });
}

// Decides which CSS class a word span should have
function applyWordClass(sp, li, wi, w) {
    sp.classList.remove('now', 'past');
    if (li === S.li && wi === S.wi) {
        sp.classList.add('now');       // current target word
    } else if (w.s !== null) {
        sp.classList.add('past');      // already tapped
    }
    // else: future word — no class (dim default)
}

// Update a single word span without rebuilding DOM
function refreshSpan(li, wi) {
    var sp = document.getElementById('W' + li + '_' + wi);
    if (!sp) return;
    var w = S.lyrics[li].words[wi];
    applyWordClass(sp, li, wi, w);
}

// ── TAP ────────────────────────────────────────────────────
function handleTap() {
    if (!S.lyrics.length || S.li >= S.lyrics.length) return;
    var t = now();
    var line = S.lyrics[S.li];

    // ── LINE MODE ──────────────────────────────────────────
    if (S.mode === 'line' || line.type === 'music') {
        line.time = t;
        advanceLine();
        genLRC();
        return;
    }

    // ── WORD MODE ──────────────────────────────────────────
    // Step 1: close the previous word's end time
    if (S.last !== null) {
        S.lyrics[S.last.li].words[S.last.wi].e = t;
        refreshSpan(S.last.li, S.last.wi);
        S.last = null;
    }

    // Step 2: stamp the current word's start
    var word = line.words[S.wi];
    word.s = t;
    if (S.wi === 0) line.time = t;   // line timestamp = first word

    // Step 3: mark this word as current (now)
    refreshSpan(S.li, S.wi);

    // Step 4: remember this word so next tap closes it
    S.last = { li: S.li, wi: S.wi };

    // Step 5: advance cursor
    if (S.wi < line.words.length - 1) {
        S.wi++;                        // next word, same line
        refreshSpan(S.li, S.wi);       // show it as 'now'
    } else {
        // End of line — move to next line
        // Mark current word as past (it's been tapped, just waiting for .e)
        var oldLi = S.li, oldWi = S.wi;
        advanceLine();
        // The span we just tapped should look 'past' not 'now'
        // (it will get .e closed on next tap via S.last)
        var sp = document.getElementById('W' + oldLi + '_' + oldWi);
        if (sp) { sp.classList.remove('now'); sp.classList.add('past'); }
    }

    updateCtx();
    genLRC();
}

function advanceLine() {
    // Remove active from old line
    var oldEl = document.getElementById('L' + S.li);
    if (oldEl) oldEl.classList.remove('active');

    S.li++;
    S.wi = 0;

    if (S.li < S.lyrics.length) {
        var newEl = document.getElementById('L' + S.li);
        if (newEl) newEl.classList.add('active');
        // In word mode, mark first word of new line as 'now'
        if (S.mode === 'word') refreshSpan(S.li, 0);
        scrollActive();
    }
}

// ── MUSIC ──────────────────────────────────────────────────
function handleMusic() {
    var t = now();
    S.lyrics.splice(S.li, 0, { type: 'music', text: '', time: t, words: [] });
    S.li++;
    renderAll();
    genLRC();
}

// ── Jump to line (tap on lyric) ────────────────────────────
function jumpTo(i) {
    S.li = i; S.wi = 0; S.last = null;
    renderAll();
}

function scrollActive() {
    var el = document.getElementById('L' + S.li);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// ── Context bar ────────────────────────────────────────────
function updateCtx() {
    var bar = document.getElementById('ctx-bar');
    if (S.mode !== 'word' || !S.lyrics.length || S.li >= S.lyrics.length) {
        bar.classList.remove('show'); return;
    }
    var line = S.lyrics[S.li];
    if (!line || line.type === 'music') { bar.classList.remove('show'); return; }

    bar.classList.add('show');
    var words = line.words;
    document.getElementById('ctx-past').textContent = S.wi > 0 ? words[S.wi - 1].t : '';
    document.getElementById('ctx-now').textContent  = words[S.wi] ? words[S.wi].t : '';
    document.getElementById('ctx-next').textContent = words[S.wi + 1] ? '→ ' + words[S.wi + 1].t : '';
}

// ── LRC Output ─────────────────────────────────────────────
function genLRC() {
    var out = [];
    S.lyrics.forEach(function(line) {
        if (line.time === null) return;
        if (line.type === 'music') {
            out.push('[' + fmtLine(line.time) + ']');
            return;
        }
        if (S.mode === 'line') {
            out.push('[' + fmtLine(line.time) + '] ' + line.text);
            return;
        }
        // word mode
        var parts = '';
        line.words.forEach(function(w, wi) {
            if (w.s !== null) {
                parts += '<' + fmtWord(w.s) + '>' + w.t;
                if (wi < line.words.length - 1) parts += ' ';
            }
        });
        var last = line.words[line.words.length - 1];
        if (last && last.e !== null) parts += '<' + fmtWord(last.e) + '>';
        if (parts) out.push('[' + fmtWord(line.time) + ']v1: ' + parts);
    });
    document.getElementById('lrc-out').value = out.join('\n');
}

// ── Export ─────────────────────────────────────────────────
function copyLRC() {
    genLRC();
    var box = document.getElementById('lrc-out');
    if (!box.value.trim()) { alert('Nothing to copy yet!'); return; }
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(box.value)
            .then(function() { alert('✅ LRC copied!'); })
            .catch(function() { fbCopy(box); });
    } else { fbCopy(box); }
}
function fbCopy(box) {
    box.select(); box.setSelectionRange(0, 99999);
    try { document.execCommand('copy'); alert('✅ LRC copied!'); }
    catch(e) { alert('Copy failed — select manually.'); }
}
function downloadLRC() {
    genLRC();
    var c = document.getElementById('lrc-out').value;
    if (!c.trim()) { alert('Nothing to download!'); return; }
    var a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([c], { type: 'application/octet-stream' }));
    a.download = 'export.lrc';
    document.body.appendChild(a); a.click();
    setTimeout(function() { document.body.removeChild(a); }, 200);
}

// ── Controls ───────────────────────────────────────────────
function togglePlay() {
    if (!player || typeof player.getPlayerState !== 'function') return;
    try { player.getPlayerState() === 1 ? player.pauseVideo() : player.playVideo(); } catch(e) {}
}
function seekBy(n) { if (player) try { player.seekTo(now() + n, true); } catch(e) {} }
function seekBar()  { if (player) try { player.seekTo(+document.getElementById('seek-bar').value, true); } catch(e) {} }

// ── Drawer ─────────────────────────────────────────────────
function openDrawer()  { document.getElementById('drawer').classList.add('open'); document.getElementById('overlay').classList.add('open'); }
function closeDrawer() { document.getElementById('drawer').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }

// ── Time formats ───────────────────────────────────────────
function fmtDisp(s) {   // topbar: mm:ss.xx
    if (!s || isNaN(s)) return '00:00.00';
    s = Math.max(0,s);
    return p2(Math.floor(s/60))+':'+p2(Math.floor(s%60))+'.'+p2(Math.floor((s%1)*100));
}
function fmtLine(s) {   // line LRC: mm:ss.xx
    if (s===null||isNaN(s)) return '00:00.00';
    s=Math.max(0,s);
    return p2(Math.floor(s/60))+':'+p2(Math.floor(s%60))+'.'+p2(Math.floor((s%1)*100));
}
function fmtWord(s) {   // word LRC: mm:ss.xxx
    if (s===null||isNaN(s)) return '00:00.000';
    s=Math.max(0,s);
    return p2(Math.floor(s/60))+':'+p2(Math.floor(s%60))+'.'+p3(Math.floor((s%1)*1000));
}
function fmtShort(s) {  // seek bar: m:ss
    if (!s||isNaN(s)) return '0:00';
    return Math.floor(s/60)+':'+p2(Math.floor(s%60));
}
function p2(n) { return n.toString().padStart(2,'0'); }
function p3(n) { return n.toString().padStart(3,'0'); }

// ── Keyboard ───────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
    if (e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT') return;
    if (e.code==='Space')      { e.preventDefault(); togglePlay(); }
    if (e.code==='Enter')      { e.preventDefault(); handleTap(); }
    if (e.code==='ArrowRight') seekBy(5);
    if (e.code==='ArrowLeft')  seekBy(-5);
    if (e.code==='KeyM')       handleMusic();
});
</script>
